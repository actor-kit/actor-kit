name = "actor-kit-adapter-tests"
main = "src/index.ts"
compatibility_date = "2024-09-25"
compatibility_flags = ["nodejs_compat"]

[vars]
ACTOR_KIT_SECRET = "test-secret"

[[durable_objects.bindings]]
name = "PLAIN_COUNTER"
class_name = "PlainCounter"

[[durable_objects.bindings]]
name = "REDUX_COUNTER"
class_name = "ReduxCounter"

[[durable_objects.bindings]]
name = "STORE_COUNTER"
class_name = "StoreCounter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PlainCounter", "ReduxCounter", "StoreCounter"]
