name: TanStack Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - closed

concurrency:
  group: tanstack-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  CLOUDFLARE_ACCOUNT_ID: ccf4d9a0a3b76ffae0b6ee048de66f07

jobs:
  deploy-preview:
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    outputs:
      preview-url: ${{ steps.deploy.outputs.preview_url }}
      worker-name: ${{ steps.naming.outputs.worker_name }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm run build

      - name: Build TanStack example
        run: pnpm --filter tanstack-start-actorkit-todo build

      - name: Compute preview worker name
        id: naming
        run: echo "worker_name=ak-ts-preview-pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

      - name: Deploy preview Worker
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WORKER_NAME: ${{ steps.naming.outputs.worker_name }}
        run: |
          set -euo pipefail
          log_file="$(mktemp)"
          pnpm --filter tanstack-start-actorkit-todo exec wrangler deploy \
            -c .output/server/wrangler.json \
            --name "$WORKER_NAME" \
            --var ACTOR_KIT_SECRET:actor-kit-preview-secret \
            2>&1 | tee "$log_file"

          preview_url="$(grep -Eo 'https://[A-Za-z0-9.-]+\.workers\.dev' "$log_file" | tail -1)"

          if [ -z "$preview_url" ]; then
            echo "Could not determine preview URL from Wrangler output." >&2
            exit 1
          fi

          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v8
        with:
          script: |
            const body = [
              "TanStack Start preview deployed.",
              "",
              `URL: ${{ steps.deploy.outputs.preview_url }}`,
              "",
              "This is a per-PR Workers deployment rather than a Cloudflare Preview URL, because Durable Objects do not get Preview URLs."
            ].join("\n");
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  e2e-preview:
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.fork == false
    needs: deploy-preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter tanstack-start-actorkit-todo exec playwright install --with-deps chromium

      - name: Run deployed TanStack preview E2E
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy-preview.outputs.preview-url }}
        run: pnpm --filter tanstack-start-actorkit-todo test:e2e

  delete-preview:
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Delete preview Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WORKER_NAME: ak-ts-preview-pr-${{ github.event.pull_request.number }}
        run: printf 'y\n' | pnpm --filter tanstack-start-actorkit-todo exec wrangler delete --name "$WORKER_NAME"
