SPECIFICATION Spec

\* Allow terminal states (bounded transitions explored, all synced)
CHECK_DEADLOCK FALSE

\* Safety: these must ALWAYS hold
INVARIANT
    PersistenceNeverAhead
    ReconnectedClientGetsCorrectState
    SyncedClientAtServerVersion
    CacheMissStillCorrect

\* Liveness: these must EVENTUALLY hold
PROPERTY
    ClientsEventuallySync
    PersistenceEventuallyComplete
    NoPermanentDesyncAfterRestart

\* Small constants to keep state space tractable
CONSTANTS
    Clients = {c1, c2}
    MaxTransitions = 3

\* Symmetry disabled for liveness checking (TLC warning).
\* Re-enable for safety-only checks:
\* SYMMETRY ClientSymmetry
