SPECIFICATION Spec

\* Allow terminal states (all transitions explored, all clients synced)
CHECK_DEADLOCK FALSE

\* Safety: these must ALWAYS hold
INVARIANT
    ClientNeverAhead
    NoPermanentDesync
    SyncedClientsAtServerVersion

\* Liveness: these must EVENTUALLY hold
PROPERTY
    ClientsEventuallySync
    PendingEventuallyDelivered

\* Small constants to keep state space tractable
CONSTANTS
    Clients = {c1, c2, c3}
    MaxTransitions = 4

\* Clients are interchangeable — reduce state space
SYMMETRY ClientSymmetry
